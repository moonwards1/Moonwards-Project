<!DOCTYPE html>
<html lang="en-US">
<head>
	<title>Calculator Template</title>
	<meta charset="utf-8">
	<link rel="stylesheet" href="template.css">
	<!-- The page script is an ES module; it imports what it needs from
	     ../../Shared/. Serve over http(s) — ES modules do not load from
	     file:// links (run serve.bat at the repo root during development). -->
	<script type="module" src="template.js"></script>
</head>
<body>
	<div class="wrapper">
		<h1>Calculator Template</h1>
		<p>
		Minimal example wiring the shared utilities together: <code>orbit.js</code>
		(body data), <code>math-utils.js</code> (<code>OrbitalMath</code>),
		<code>format-utils.js</code> (<code>Fmt</code>) and
		<code>ui-components.js</code> (<code>create</code>). Copy this folder to
		<code>Calculators/&lt;YourCalc&gt;/</code> to start a new calculator.
		</p>
		<div id="insertItHere"></div>
	</div>
</body>
</html>
