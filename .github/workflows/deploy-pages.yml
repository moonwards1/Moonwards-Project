# Publishes Website/ to GitHub Pages on every push to the default branch.
# The folder is served exactly as committed — no build step. The Actions
# route (upload-pages-artifact) skips Jekyll, so underscore-prefixed paths
# like Website/Calculators/_template/ publish correctly; Website/.nojekyll
# is a belt-and-braces guard in case deployment ever switches to
# deploy-from-branch.

name: Deploy website to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Website/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Website

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
